name: Execução Agendada de Testes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'


jobs:
  test:
    name: Testes e geração de relatório
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🧪 Executar testes
        run: npm test

      - name: 📊 Upload relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: mochawesome-report/
          retention-days: 30

      - name: 📝 Comentário com resultado
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'mochawesome-report/mochawesome.json';
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const stats = report.stats;
              const comment = `## 🧪 Resultado dos Testes
              | Métrica | Resultado |
              |---------|----------|
              | ✅ Passaram | ${stats.passes} |
              | ❌ Falharam | ${stats.failures} |
              | ⏭️ Pulados | ${stats.skipped} |
              | ⏱️ Duração | ${(stats.duration / 1000).toFixed(2)}s |
              [📊 Abrir Relatório Completo](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
              core.notice(comment);
            }
